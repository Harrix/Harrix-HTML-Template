<div id="h-mobile-top-nav" class="h-mobile-top-nav" aria-label="<%= i18n.mobileNavRegion %>">
  <div id="h-mobile-top-nav-search-panel" class="h-mobile-top-nav-search-panel" aria-hidden="true">
    <div class="h-mobile-top-nav-search-panel__inner">
      <div class="h-mobile-top-nav-search-panel__field">
        <input type="text" class="h-mobile-top-nav-search-panel__input input" id="h-mobile-top-nav-search-input" placeholder="<%= i18n.searchPlaceholder %>" aria-label="<%= i18n.search %>" autocomplete="off" />
        <button type="button" class="h-mobile-top-nav-search-panel__clear is-hidden" id="h-mobile-top-nav-search-clear" aria-label="<%= i18n.clearSearch %>">
          <span class="icon is-small" aria-hidden="true"><i class="fas fa-circle-xmark"></i></span>
        </button>
      </div>
      <button type="button" class="h-mobile-top-nav-search-panel__submit" id="h-mobile-top-nav-search-submit" aria-label="<%= i18n.search %>">
        <span class="icon is-small" aria-hidden="true"><i class="fas fa-search"></i></span>
      </button>
      <button type="button" class="h-mobile-top-nav-search-panel__close" id="h-mobile-top-nav-search-close" aria-label="<%= i18n.close %>">
        <span class="icon is-small"><i class="fas fa-times"></i></span>
      </button>
    </div>
  </div>
  <div class="h-mobile-top-nav__row1">
    <button type="button" class="h-mobile-top-nav__btn h-mobile-top-nav__btn--sidebar" id="h-mobile-top-nav-sidebar" aria-label="<%= i18n.sidebarAria %>">
      <span class="icon" aria-hidden="true"><i class="fas fa-bars"></i></span>
    </button>
    <a class="h-mobile-top-nav__logo" href="/" id="h-mobile-top-nav-logo">
      <img src="img/logo.svg" alt="Harrix" /> Harrix <span class="h-is-sub"><%= i18n.brandSubtitle %></span>
    </a>
    <button type="button" class="h-mobile-top-nav__btn" id="h-mobile-top-nav-search" aria-label="<%= i18n.search %>">
      <span class="icon" aria-hidden="true"><i class="fas fa-search"></i></span>
    </button>
    <button type="button" class="h-mobile-top-nav__btn" id="h-mobile-top-nav-menu" aria-label="<%= i18n.menuTitle %>">
      <span class="icon" aria-hidden="true"><i class="fas fa-ellipsis-vertical"></i></span>
    </button>
  </div>
  <div class="h-mobile-top-nav__row2">
    <button type="button" class="h-mobile-top-nav__toc-trigger" id="h-mobile-top-nav-toc-trigger" aria-label="<%= i18n.toc %>" aria-expanded="false" aria-controls="h-mobile-top-nav-dropdown">
      <span class="icon" aria-hidden="true"><i class="fas fa-list"></i></span>
      <span class="h-mobile-top-nav__toc-trigger-label" id="h-mobile-top-nav-toc-trigger-label"><%= i18n.toc %></span>
    </button>
  </div>
  <div id="h-mobile-top-nav-dropdown" class="h-mobile-top-nav__dropdown" role="region" aria-label="<%= i18n.toc %>"></div>
  <div id="h-mobile-top-nav-dropdown-backdrop" class="h-mobile-top-nav__dropdown-backdrop" aria-hidden="true"></div>
</div>
<div id="h-mobile-top-nav-menu-panel" class="h-mobile-top-nav__menu-panel" role="dialog" aria-label="<%= i18n.mobileNavMenuDialog %>" aria-hidden="true"></div>
<div id="h-mobile-top-nav-menu-backdrop" class="h-mobile-top-nav__menu-backdrop" aria-hidden="true"></div>
