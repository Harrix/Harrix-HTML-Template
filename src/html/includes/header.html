<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title><%=title%></title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="icon" type="image/svg+xml" sizes="any" href="favicon/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png" />
    <meta name="theme-color" content="#de2b26" />

    <script>
      (function () {
        if (window.location.protocol === "http:" || window.location.protocol === "https:") {
          var link = document.createElement("link");
          link.rel = "manifest";
          link.href = "favicon/manifest.json";
          document.head.appendChild(link);
        }
      })();
    </script>
    <script>
      (function () {
        var stored = localStorage.getItem("h-theme");
        var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = stored === "dark" || stored === "light" ? stored : (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
    <script>document.documentElement.classList.add("h-fit-pending");</script>
  </head>

  <body class="has-navbar-fixed-top<%= typeof mobileNavTop !== 'undefined' && mobileNavTop ? ' h-mobile-nav-top' : '' %><%= typeof hasDocsSidebar !== 'undefined' && hasDocsSidebar ? ' h-has-docs-sidebar' : '' %>">

        <div class="navbar-brand">

        </div>
        <div class="h-navbar-toc-row" id="h-navbar-toc-row" aria-hidden="true" hidden>
          <button type="button" class="h-navbar-toc-trigger" id="h-navbar-toc-trigger" aria-label="Содержание" aria-expanded="false" aria-controls="h-page-toc">
            <span class="icon" aria-hidden="true"><i class="fas fa-list"></i></span>
