<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title><%=title%></title>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <link rel="icon" type="image/svg+xml" sizes="any" href="favicon/favicon.svg" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="favicon/favicon-96x96.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="favicon/favicon-192x192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png" />
    <link rel="mask-icon" href="favicon/safari-pinned-tab.svg" color="#de2b26" />
    <link rel="shortcut icon" href="favicon/favicon.ico" />
    <meta name="msapplication-config" content="favicon/browserconfig.xml" />
    <meta name="theme-color" content="#de2b26" />

    <script>
      (function () {
        if (window.location.protocol === "http:" || window.location.protocol === "https:") {
          var link = document.createElement("link");
          link.rel = "manifest";
          link.href = "favicon/manifest.json";
          document.head.appendChild(link);
        }
      })();
    </script>
    <script>
      (function () {
        var stored = localStorage.getItem("h-theme");
        var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = stored === "dark" || stored === "light" ? stored : (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-bs-theme", theme);
      })();
    </script>
  </head>

  <body>
    <nav id="h-navbar" class="navbar fixed-top navbar-expand-lg" aria-label="main navigation">
      <div id="h-navbar-bottom"></div>
      <div class="container">
        <a class="navbar-brand" href="/" id="h-logo">
          <img src="img/logo.svg" alt="Harrix" /> Harrix <span class="h-is-sub">Проект</span>
        </a>
        <button id="h-burger" class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#h-navbar-menu" aria-controls="h-navbar-menu" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div id="h-navbar-menu" class="collapse navbar-collapse">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item" id="h-search-form">
              <div class="h-search-control input-group">
                <form role="search" method="get" action="/" class="w-100">
                  <input class="form-control shadow-none" type="text" value="" id="h-search-input" />
                </form>
                <span class="icon input-group-text"><i class="fas fa-search"></i></span>
                <span class="icon input-group-text h-is-clickable d-none d-lg-inline-flex" id="h-search-button-close"
                  ><i class="fah fa-close" data-prefix="fah" data-icon="close"></i
                ></span>
              </div>
            </li>
            <li class="nav-item"><a class="nav-link active" href="https://harrix.org/projects/">Проекты</a></li>
            <li class="nav-item"><a class="nav-link" href="https://harrix.org/"><span class="icon"><i class="fah fa-harrix" data-prefix="fah" data-icon="harrix"></i></span> Harrix.org</a></li>
            <li class="nav-item"><a class="nav-link" href="https://harrix.org/contacts">Контакты</a></li>
            <li class="nav-item">
              <a class="nav-link" href="https://github.com/Harrix">
                <span class="icon h-is-github-icon"><i class="fab fa-github"></i></span> GitHub
              </a>
            </li>
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">Подменю</a>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#">Action</a></li>
                <li><a class="dropdown-item" href="#">Another action</a></li>
                <li><a class="dropdown-item" href="#">Something else here</a></li>
              </ul>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="https://github.com/Harrix">
                <span class="icon"><i class="fas fa-rss"></i></span> RSS
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="https://harrix.org/">
                <span class="icon"><i class="fas fa-globe-americas"></i></span> Eng
              </a>
            </li>
            <li class="nav-item h-is-clickable" id="h-theme-toggle" role="button" aria-label="Переключить светлую/тёмную тему">
              <span class="nav-link">
                <span class="icon h-theme-icon h-theme-icon--light" aria-hidden="true"><i class="fas fa-sun"></i></span>
                <span class="icon h-theme-icon h-theme-icon--dark" aria-hidden="true"><i class="fas fa-moon"></i></span>
              </span>
            </li>
            <li class="nav-item h-is-clickable d-none d-lg-inline-flex" id="h-search-button-open">
              <span class="nav-link"><span class="icon"><i class="fas fa-search"></i></span></span>
            </li>
          </ul>
        </div>
      </div>
    </nav>
